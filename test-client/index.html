<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentchat Test Client</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #0f0f0f;
        color: #e8e8e8;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      button {
        cursor: pointer;
        border: none;
        border-radius: 6px;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 500;
        transition: opacity 0.15s;
      }
      button:hover {
        opacity: 0.85;
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      input {
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 8px 12px;
        color: #e8e8e8;
        font-size: 14px;
        width: 100%;
      }
      input:focus {
        outline: none;
        border-color: #7c9ef8;
      }

      /* Layout */
      #app {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      #sidebar {
        width: 280px;
        background: #151515;
        border-right: 1px solid #222;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
      }
      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Sidebar sections */
      .sidebar-section {
        padding: 14px 16px;
        border-bottom: 1px solid #1e1e1e;
      }
      .sidebar-section h3 {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #555;
        margin-bottom: 10px;
      }

      /* Auth panel */
      #auth-panel .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 10px;
      }
      #auth-panel .tab {
        background: #1e1e1e;
        color: #555;
        padding: 5px 12px;
        border-radius: 4px;
        font-size: 13px;
        border: 1px solid transparent;
      }
      #auth-panel .tab.active {
        background: #1a2a4a;
        color: #7c9ef8;
        border-color: #7c9ef8;
      }
      #auth-panel .fields {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      #auth-panel .fields input {
        font-size: 13px;
      }
      #auth-status {
        font-size: 12px;
        margin-top: 6px;
      }
      .status-ok {
        color: #4ade80;
      }
      .status-err {
        color: #f87171;
      }
      #google-btn {
        background: #fff;
        color: #222;
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
        width: 100%;
        margin-top: 8px;
        font-size: 13px;
      }
      #user-card {
        display: none;
        flex-direction: row;
        align-items: center;
        gap: 8px;
      }
      #user-card .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: #7c9ef8;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
        color: #000;
        flex-shrink: 0;
      }
      #user-card .info {
        flex: 1;
        min-width: 0;
      }
      #user-card .uname {
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #user-card .uemail {
        font-size: 11px;
        color: #555;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #logout-btn {
        background: #2a1515;
        color: #f87171;
        font-size: 11px;
        padding: 4px 8px;
        flex-shrink: 0;
      }

      /* Rooms list */
      #rooms-panel {
        display: none;
        flex-direction: column;
        flex: 1;
        overflow: hidden;
      }
      #rooms-panel.visible {
        display: flex;
      }
      #rooms-signin {
        color: #444;
        font-size: 12px;
      }
      .create-row {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
      }
      .create-row input {
        font-size: 13px;
      }
      .create-row button {
        background: #7c9ef8;
        color: #000;
        font-size: 13px;
        padding: 8px 10px;
        flex-shrink: 0;
      }
      #rooms-scroll {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .room-row {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 10px;
        border-radius: 6px;
        background: #1a1a1a;
        cursor: pointer;
      }
      .room-row:hover,
      .room-row.active {
        background: #222;
      }
      .room-row.active {
        border-left: 2px solid #7c9ef8;
      }
      .room-row .rname {
        flex: 1;
        font-size: 13px;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .room-row .rmeta {
        font-size: 11px;
        color: #444;
        white-space: nowrap;
      }
      .badge {
        background: #7c9ef8;
        color: #000;
        font-size: 10px;
        font-weight: 700;
        border-radius: 10px;
        padding: 1px 5px;
      }
      #rooms-empty {
        font-size: 12px;
        color: #444;
        text-align: center;
        padding: 20px 0;
      }

      /* Main panel states */
      #main-placeholder {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #2a2a2a;
        font-size: 14px;
      }

      /* Room detail */
      #room-detail {
        display: none;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
      }
      #room-detail.visible {
        display: flex;
      }
      #room-header {
        padding: 14px 20px;
        border-bottom: 1px solid #1e1e1e;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #room-header .rh-name {
        font-size: 16px;
        font-weight: 600;
        flex: 1;
      }
      #room-header .rh-meta {
        font-size: 12px;
        color: #555;
      }
      #room-header .rh-type {
        font-size: 10px;
        background: #1e1e1e;
        color: #666;
        padding: 2px 7px;
        border-radius: 4px;
      }
      #room-actions {
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        border-bottom: 1px solid #1e1e1e;
      }
      .action-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .action-group label {
        font-size: 11px;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .action-row {
        display: flex;
        gap: 6px;
      }
      .action-row input {
        font-size: 13px;
      }
      .btn-invite {
        background: #4ade80;
        color: #000;
        font-size: 13px;
        padding: 8px 12px;
        flex-shrink: 0;
      }
      .btn-remove {
        background: #f87171;
        color: #000;
        font-size: 13px;
        padding: 8px 12px;
        flex-shrink: 0;
      }
      .btn-leave {
        background: #2a2020;
        color: #f87171;
        font-size: 13px;
      }
      .btn-delete {
        background: #7f1d1d;
        color: #fca5a5;
        font-size: 13px;
      }
      #chat-compose {
        padding: 12px 20px;
        border-top: 1px solid #1e1e1e;
      }
      #room-footer {
        padding: 8px 20px 12px;
        display: flex;
        gap: 8px;
      }
      #chat-placeholder {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #2a2a2a;
        font-size: 13px;
      }

      /* Members list */
      #members-bar {
        padding: 10px 20px;
        border-bottom: 1px solid #1e1e1e;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      #members-bar .mem-chip {
        display: flex;
        align-items: center;
        gap: 5px;
        background: #1a1a1a;
        border-radius: 20px;
        padding: 4px 10px 4px 4px;
        font-size: 12px;
        cursor: pointer;
        border: 1px solid transparent;
        transition: border-color 0.15s;
      }
      #members-bar .mem-chip:hover {
        border-color: #7c9ef8;
      }
      #members-bar .mem-chip.self {
        cursor: default;
      }
      #members-bar .mem-chip.self:hover {
        border-color: transparent;
      }
      #members-bar .mem-avatar {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #7c9ef8;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        color: #000;
        flex-shrink: 0;
      }
      #members-bar .mem-avatar.owner {
        background: #fbbf24;
      }
      #members-bar .mem-name {
        color: #ccc;
        max-width: 80px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* User search dropdown */
      #user-search-results {
        position: absolute;
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 6px;
        width: 100%;
        z-index: 50;
        max-height: 160px;
        overflow-y: auto;
        display: none;
      }
      .search-result-item {
        padding: 7px 10px;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .search-result-item:hover { background: #2a2a2a; }
      .search-result-item .sr-name { color: #e8e8e8; }
      .search-result-item .sr-email { color: #555; font-size: 11px; }
      #dm-search-wrap { position: relative; }

      /* Mic button */
      #mic-btn {
        background: #2a2a2a;
        color: #aaa;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 18px;
        flex-shrink: 0;
        line-height: 1;
      }
      #mic-btn.recording {
        background: #7f1d1d;
        color: #fca5a5;
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      /* @mention highlights */
      .mention {
        font-weight: 600;
        border-radius: 3px;
        padding: 0 2px;
        color: #7c9ef8;
      }
      .mention.mention-self {
        background: rgba(124, 158, 248, 0.15);
        color: #a5c0ff;
      }

      /* Audio player in bubbles */
      .msg-audio {
        margin-top: 6px;
        width: 100%;
        max-width: 260px;
        height: 36px;
        border-radius: 6px;
        accent-color: #7c9ef8;
      }

      /* AI / Voice message label */
      .msg-type-badge {
        font-size: 10px;
        color: #555;
        margin-bottom: 2px;
      }

      /* Toast */
      #toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 13px;
        display: none;
        z-index: 999;
        max-width: 320px;
      }
      #toast.error {
        border-color: #7f1d1d;
        color: #f87171;
      }
      #toast.success {
        border-color: #14532d;
        color: #4ade80;
      }

      /* ── Mobile back / settings buttons (hidden on desktop) ── */
      #back-btn {
        display: none;
        background: transparent;
        color: #7c9ef8;
        padding: 6px 8px;
        font-size: 22px;
        min-width: 40px;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      #room-settings-btn {
        display: none;
        background: transparent;
        color: #666;
        padding: 6px 8px;
        font-size: 18px;
        min-width: 40px;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      /* ── Mobile layout ── */
      @media (max-width: 768px) {
        /* Sidebar and main stack; only one visible at a time */
        #app {
          position: relative;
          overflow: hidden;
        }
        #sidebar {
          position: fixed;
          inset: 0;
          width: 100%;
          z-index: 100;
          transform: translateX(0);
          transition: transform 0.25s ease;
        }
        #sidebar.mobile-hidden {
          transform: translateX(-100%);
          pointer-events: none;
        }
        #main {
          position: fixed;
          inset: 0;
          transform: translateX(100%);
          transition: transform 0.25s ease;
        }
        #main.mobile-visible {
          transform: translateX(0);
        }

        /* Show nav buttons */
        #back-btn       { display: flex; }
        #room-settings-btn { display: flex; }

        /* Collapse room-actions panel behind the settings button */
        #room-actions {
          display: none;
          overflow: hidden;
        }
        #room-actions.expanded {
          display: flex;
        }

        /* Prevent iOS zoom on input focus (font-size must be >= 16px) */
        input, textarea, select {
          font-size: 16px !important;
        }

        /* Touch-friendly targets */
        button {
          min-height: 44px;
        }
        .room-row {
          padding: 12px 10px;
          min-height: 52px;
        }
        #mic-btn {
          min-width: 48px;
          padding: 0;
        }
        #send-btn {
          min-width: 64px;
        }

        /* Audio player fills bubble width on small screens */
        .msg-audio {
          max-width: 100%;
          width: 100%;
        }

        /* Toast above thumb reach */
        #toast {
          bottom: 80px;
          left: 12px;
          right: 12px;
          max-width: none;
        }

        /* Room header layout */
        #room-header {
          padding: 10px 12px;
          gap: 6px;
        }
        #room-header .rh-name {
          font-size: 15px;
        }

        /* Slightly more padding for chat compose */
        #chat-compose {
          padding: 10px 12px;
          padding-bottom: env(safe-area-inset-bottom, 10px);
        }
        #room-footer {
          padding: 8px 12px;
          padding-bottom: env(safe-area-inset-bottom, 8px);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- ── Sidebar ─────────────────────────────────────────────── -->
      <div id="sidebar">
        <!-- Auth section -->
        <div class="sidebar-section" id="auth-panel">
          <h3>Auth</h3>
          <div id="logged-out">
            <div class="tabs">
              <button class="tab active" onclick="switchTab('login', this)">
                Login
              </button>
              <button class="tab" onclick="switchTab('register', this)">
                Register
              </button>
            </div>
            <div class="fields">
              <div id="name-field" style="display: none">
                <input type="text" id="name" placeholder="Display name" />
              </div>
              <input type="email" id="email" placeholder="Email" />
              <input type="password" id="password" placeholder="Password" />
              <button
                onclick="submitAuth()"
                style="background: #7c9ef8; color: #000"
                id="auth-submit-btn"
              >
                Login
              </button>
            </div>
            <div id="auth-status"></div>
            <button id="google-btn" onclick="googleLogin()">
              <svg width="16" height="16" viewBox="0 0 24 24">
                <path
                  fill="#4285F4"
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                />
                <path
                  fill="#34A853"
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                />
                <path
                  fill="#FBBC05"
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                />
                <path
                  fill="#EA4335"
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                />
              </svg>
              Continue with Google
            </button>
          </div>
          <div id="logged-in" style="display: none">
            <div id="user-card" style="display: flex">
              <div class="avatar" id="user-avatar">?</div>
              <div class="info">
                <div class="uname" id="user-name">—</div>
                <div class="uemail" id="user-email">—</div>
              </div>
              <button id="logout-btn" onclick="logout()">Sign out</button>
            </div>
          </div>
        </div>

        <!-- Rooms section -->
        <div
          class="sidebar-section"
          style="
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding-bottom: 0;
          "
        >
          <h3>Rooms</h3>
          <div id="rooms-signin" style="font-size: 12px; color: #444">
            Sign in to load rooms
          </div>
          <div id="rooms-panel">
            <div class="create-row">
              <input
                type="text"
                id="new-room-name"
                placeholder="New room name…"
              />
              <button id="create-room-btn" onclick="createRoom()">+</button>
            </div>
            <div id="rooms-scroll">
              <div id="rooms-empty" style="display: none">No rooms yet.</div>
            </div>
          </div>
        </div>

        <!-- DM section -->
        <div class="sidebar-section" id="dm-panel" style="display: none">
          <h3>Direct Message</h3>
          <!-- User search -->
          <div id="dm-search-wrap" style="margin-bottom: 8px">
            <input
              type="text"
              id="user-search-input"
              placeholder="Search users…"
              autocomplete="off"
              oninput="onUserSearch(event)"
              onfocus="onUserSearch(event)"
              style="font-size: 13px"
            />
            <div id="user-search-results"></div>
          </div>
          <div class="create-row">
            <input type="email" id="dm-email" placeholder="user@example.com" />
            <button
              id="dm-btn"
              onclick="openDm()"
              style="
                background: #7c9ef8;
                color: #000;
                font-size: 13px;
                padding: 8px 10px;
                flex-shrink: 0;
              "
            >
              DM
            </button>
          </div>
          <div id="dm-status" style="font-size: 12px; margin-top: 4px"></div>
        </div>
      </div>

      <!-- ── Main ───────────────────────────────────────────────── -->
      <div id="main">
        <div id="main-placeholder">Sign in to start chatting</div>

        <!-- Room detail (shown when a room is selected) -->
        <div id="room-detail">
          <div id="room-header">
            <button id="back-btn" onclick="showMobileSidebar()" title="Back to rooms">&#8592;</button>
            <div style="flex:1;min-width:0">
              <div class="rh-name" id="rh-name">—</div>
              <div class="rh-meta">
                <span id="rh-count">0</span> members ·
                <span id="rh-type" class="rh-type">CHANNEL</span>
              </div>
            </div>
            <button id="room-settings-btn" onclick="toggleRoomActions()" title="Room settings">⚙️</button>
          </div>

          <div id="room-actions">
            <!-- Invite by email (owner only) -->
            <div class="action-group" id="action-invite" style="display: none">
              <label>Invite member by email</label>
              <div class="action-row">
                <input
                  type="email"
                  id="invite-email"
                  placeholder="user@example.com"
                />
                <button
                  class="btn-invite"
                  id="invite-btn"
                  onclick="inviteUser()"
                >
                  Invite
                </button>
              </div>
              <div id="invite-status" style="font-size: 12px"></div>
            </div>

            <!-- Remove member (owner only) -->
            <div class="action-group" id="action-remove" style="display: none">
              <label>Remove member by email</label>
              <div class="action-row">
                <input
                  type="email"
                  id="remove-email"
                  placeholder="user@example.com"
                />
                <button
                  class="btn-remove"
                  id="remove-btn"
                  onclick="removeMember()"
                >
                  Remove
                </button>
              </div>
              <div id="remove-status" style="font-size: 12px"></div>
            </div>
          </div>

          <div id="members-bar"></div>
          <div id="chat-area" style="flex: 1; overflow-y: auto"></div>

          <div id="chat-compose">
            <div
              id="typing-indicator"
              style="
                font-size: 12px;
                color: #555;
                min-height: 16px;
                padding: 0 4px 4px;
              "
            ></div>
            <div style="display: flex; gap: 8px; align-items: flex-end">
              <textarea
                id="chat-input"
                placeholder="Type a message…"
                style="
                  flex: 1;
                  resize: none;
                  height: 40px;
                  background: #1a1a1a;
                  border: 1px solid #333;
                  border-radius: 8px;
                  padding: 10px 12px;
                  color: #e8e8e8;
                  font-size: 14px;
                  font-family: inherit;
                  line-height: 1.4;
                "
                onkeydown="onChatKeyDown(event)"
                oninput="onChatInput(event)"
              ></textarea>
              <button id="mic-btn" onclick="toggleVoice()" title="Record voice message">🎤</button>
              <button
                id="send-btn"
                onclick="sendMessage()"
                style="
                  background: #7c9ef8;
                  color: #000;
                  padding: 10px 18px;
                  border-radius: 8px;
                  font-size: 14px;
                  flex-shrink: 0;
                "
              >
                Send
              </button>
            </div>
          </div>

          <div id="room-footer">
            <button class="btn-leave" onclick="leaveRoom()" id="leave-btn">
              Leave room
            </button>
            <button
              class="btn-delete"
              onclick="deleteRoom()"
              id="delete-btn"
              style="display: none"
            >
              Delete room
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      const API = '/api';

      let token = null;
      let refreshToken = null;
      let currentUser = null;
      let activeTab = 'login';
      let activeRoom = null; // { id, name, type, memberCount, role, ... }
      let socket = null; // Socket.io instance
      const lastSeenId = new Map(); // roomId → id of newest message the client has
      const roomMeta = new Map(); // roomId → { preview, unreadCount } for sidebar updates
      const messagesCache = new Map(); // roomId → array of message objects (for instant room switch)
      const tempBubbles = new Map(); // tempMessageId → DOM element (AI streaming)

      // Voice recording state
      let mediaRecorder = null;
      let audioChunks = [];
      let isRecording = false;

      // User search debounce
      let userSearchTimer = null;

      // ── Mobile panel helpers ──────────────────────────────────────────────────
      function isMobile() { return window.innerWidth <= 768; }

      function showMobileChat() {
        if (!isMobile()) return;
        document.getElementById('sidebar').classList.add('mobile-hidden');
        document.getElementById('main').classList.add('mobile-visible');
      }

      function showMobileSidebar() {
        if (!isMobile()) return;
        document.getElementById('sidebar').classList.remove('mobile-hidden');
        document.getElementById('main').classList.remove('mobile-visible');
        // Keep activeRoom set so incoming messages still work;
        // just re-highlight the active row in sidebar
      }

      function toggleRoomActions() {
        document.getElementById('room-actions').classList.toggle('expanded');
      }

      // ── Boot ──────────────────────────────────────────────────────────────────
      (function boot() {
        const t = new URLSearchParams(location.search).get('token');
        if (t) {
          token = t;
          localStorage.setItem('__dev_token', t);
          history.replaceState({}, '', '/');
        } else {
          token = localStorage.getItem('__dev_token');
          refreshToken = localStorage.getItem('__dev_refresh_token');
        }
        if (token) fetchMe();
      })();

      // ── Auth ──────────────────────────────────────────────────────────────────
      // ── User search ───────────────────────────────────────────────────────────
      function onUserSearch(e) {
        const q = e.target.value.trim();
        const dropdown = document.getElementById('user-search-results');
        clearTimeout(userSearchTimer);
        if (q.length < 3) { dropdown.style.display = 'none'; return; }
        userSearchTimer = setTimeout(async () => {
          try {
            const res = await fetch(`${API}/users/search?q=${encodeURIComponent(q)}`, {
              headers: { Authorization: `Bearer ${token}` },
            });
            const json = await res.json();
            if (!json.success || !json.data.length) { dropdown.style.display = 'none'; return; }
            dropdown.innerHTML = '';
            json.data.forEach((u) => {
              const item = document.createElement('div');
              item.className = 'search-result-item';
              item.innerHTML = `<span class="sr-name">${esc(u.name)}</span><span class="sr-email">${esc(u.email)}</span>`;
              item.addEventListener('click', () => {
                document.getElementById('dm-email').value = u.email;
                document.getElementById('user-search-input').value = '';
                dropdown.style.display = 'none';
                openDm();
              });
              dropdown.appendChild(item);
            });
            dropdown.style.display = 'block';
          } catch (_) { dropdown.style.display = 'none'; }
        }, 300);
      }

      // Close search dropdown when clicking outside
      document.addEventListener('click', (e) => {
        if (!document.getElementById('dm-search-wrap')?.contains(e.target)) {
          const d = document.getElementById('user-search-results');
          if (d) d.style.display = 'none';
        }
      });

      // ── Voice recording ───────────────────────────────────────────────────────
      let voiceUploading = false; // lock — prevent double-send

      async function toggleVoice() {
        if (voiceUploading) return; // uploading in progress, ignore
        if (isRecording) {
          stopVoice();
        } else {
          await startVoice();
        }
      }

      async function startVoice() {
        if (!activeRoom) { toast('Open a room first', 'error'); return; }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          audioChunks = [];
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
          mediaRecorder.onstop = async () => {
            stream.getTracks().forEach((t) => t.stop());
            const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
            await uploadVoice(blob);
          };
          mediaRecorder.start();
          isRecording = true;
          document.getElementById('mic-btn').classList.add('recording');
          document.getElementById('mic-btn').title = 'Stop recording';
        } catch (err) {
          toast('Microphone access denied', 'error');
        }
      }

      function stopVoice() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        isRecording = false;
        const btn = document.getElementById('mic-btn');
        btn.classList.remove('recording');
        btn.title = 'Stop recording — uploading…';
        // mic stays disabled (voiceUploading=true set in uploadVoice)
      }

      async function uploadVoice(blob) {
        if (!activeRoom) return;
        voiceUploading = true;
        const btn = document.getElementById('mic-btn');
        btn.disabled = true;
        btn.textContent = '⏳';
        btn.title = 'Uploading…';

        // Optimistic placeholder bubble for the sender
        const optId = `voice-opt-${Date.now()}`;
        const area = document.getElementById('chat-area');
        const placeholder = buildMessageEl({
          id: optId,
          userId: currentUser.id,
          content: '🎤 Sending voice message…',
          type: 'VOICE',
          createdAt: new Date().toISOString(),
          user: currentUser,
        }, true);
        area.appendChild(placeholder);
        area.scrollTop = area.scrollHeight;

        const mimeType = blob.type || 'audio/webm';
        const ext = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('wav') ? 'wav' : 'webm';
        const form = new FormData();
        form.append('file', blob, `voice.${ext}`);
        form.append('roomId', activeRoom.id);
        try {
          const res = await fetch(`${API}/voice/upload`, {
            method: 'POST',
            headers: { Authorization: `Bearer ${token}` },
            body: form,
          });
          const json = await res.json();
          if (!res.ok) {
            toast(json.message || 'Voice upload failed', 'error');
            placeholder.remove(); // remove placeholder on failure
          } else {
            // Remove optimistic placeholder — the real message will arrive via new_message
            placeholder.remove();
          }
        } catch (_) {
          toast('Voice upload failed', 'error');
          placeholder.remove();
        } finally {
          voiceUploading = false;
          btn.disabled = false;
          btn.textContent = '🎤';
          btn.title = 'Record voice message';
        }
      }

      function switchTab(tab, btn) {
        activeTab = tab;
        document
          .querySelectorAll('#auth-panel .tab')
          .forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('auth-submit-btn').textContent =
          tab === 'login' ? 'Login' : 'Register';
        document.getElementById('name-field').style.display =
          tab === 'register' ? 'block' : 'none';
        document.getElementById('auth-status').textContent = '';
      }

      async function submitAuth() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const name = document.getElementById('name').value.trim();
        if (!email || !password)
          return showStatus('Email and password required', 'err');
        const endpoint =
          activeTab === 'login' ? '/auth/login' : '/auth/register';
        const body =
          activeTab === 'register'
            ? { email, password, name }
            : { email, password };
        const btn = document.getElementById('auth-submit-btn');
        btn.disabled = true;
        try {
          const res = await fetch(`${API}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const json = await res.json();
          if (!res.ok)
            return showStatus(json.message || 'Request failed', 'err');
          token = json.data.accessToken;
          refreshToken = json.data.refreshToken;
          localStorage.setItem('__dev_token', token);
          localStorage.setItem('__dev_refresh_token', refreshToken);
          await fetchMe();
        } catch {
          showStatus('Network error', 'err');
        } finally {
          btn.disabled = false;
        }
      }

      function googleLogin() {
        window.location.href = `${API}/auth/google`;
      }

      async function fetchMe() {
        if (!token) return;
        try {
          const res = await fetch(`${API}/auth/me`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (res.status === 401) {
            // Access token expired — try to refresh silently
            const refreshed = await tryRefresh();
            if (!refreshed) return;
            return fetchMe();
          }
          if (!res.ok) {
            token = null;
            localStorage.removeItem('__dev_token');
            return;
          }
          const json = await res.json();
          currentUser = json.data;
          showLoggedIn();
          loadRooms();
        } catch {
          token = null;
        }
      }

      // Attempts to get a new token pair using the stored refresh token.
      // Returns true on success, false if the session is fully expired.
      async function tryRefresh() {
        if (!refreshToken) return false;
        try {
          const res = await fetch(`${API}/auth/refresh`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ refreshToken }),
          });
          if (!res.ok) {
            token = null; refreshToken = null;
            localStorage.removeItem('__dev_token');
            localStorage.removeItem('__dev_refresh_token');
            showLoggedOut();
            toast('Session expired — please sign in again', 'error');
            return false;
          }
          const json = await res.json();
          token = json.data.accessToken;
          refreshToken = json.data.refreshToken;
          localStorage.setItem('__dev_token', token);
          localStorage.setItem('__dev_refresh_token', refreshToken);
          return true;
        } catch {
          return false;
        }
      }

      async function logout() {
        if (!token) return;
        const btn = document.getElementById('logout-btn');
        btn.disabled = true;
        try {
          await fetch(`${API}/auth/logout`, {
            method: 'POST',
            headers: { Authorization: `Bearer ${token}` },
          });
        } catch {
        } finally {
          btn.disabled = false;
        }
        token = null;
        refreshToken = null;
        currentUser = null;
        localStorage.removeItem('__dev_token');
        localStorage.removeItem('__dev_refresh_token');
        showLoggedOut();
        toast('Signed out', 'success');
      }

      // ── Rooms list ────────────────────────────────────────────────────────────
      async function loadRooms() {
        try {
          const res = await fetch(`${API}/rooms`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) return;
          const json = await res.json();
          renderRooms(json.data || []);
        } catch {}
      }

      function renderRooms(rooms) {
        const scroll = document.getElementById('rooms-scroll');
        const empty = document.getElementById('rooms-empty');
        scroll.querySelectorAll('.room-row').forEach((el) => el.remove());

        if (rooms.length === 0) {
          empty.style.display = 'block';
          return;
        }
        empty.style.display = 'none';

        rooms.forEach((room) => {
          // seed / refresh client-side meta — preserve unreadCount=0 if user already has room open
          const isActive = activeRoom?.id === room.id;
          roomMeta.set(room.id, {
            preview: room.lastMessage
              ? trunc(room.lastMessage.content, 26)
              : 'No messages',
            unreadCount: isActive ? 0 : (room.unreadCount ?? 0),
          });
          const div = document.createElement('div');
          div.className =
            'room-row' + (activeRoom?.id === room.id ? ' active' : '');
          div.dataset.id = room.id;
          renderRoomRow(
            div,
            room.dmPartner?.name || room.name || 'DM',
            room.id,
          );
          div.addEventListener('click', () => openRoom(room));
          scroll.appendChild(div);
        });

        // Subscribe to all rooms so we receive events without needing to open them
        if (socket?.connected && rooms.length > 0) {
          socket.emit('subscribe_rooms', { roomIds: rooms.map((r) => r.id) });
        }
      }

      function renderRoomRow(div, displayName, roomId) {
        const meta = roomMeta.get(roomId) || {
          preview: 'No messages',
          unreadCount: 0,
        };
        div.innerHTML = `
          <div style="flex:1;min-width:0">
            <div class="rname">${esc(displayName)}</div>
            <div class="rmeta">${esc(meta.preview)}</div>
          </div>
          ${meta.unreadCount > 0 ? `<span class="badge">${meta.unreadCount}</span>` : ''}
        `;
      }

      function updateRoomRowMeta(roomId, preview, unreadDelta) {
        const meta = roomMeta.get(roomId);
        if (!meta) return; // room not loaded yet
        meta.preview = preview;
        meta.unreadCount = Math.max(0, (meta.unreadCount ?? 0) + unreadDelta);
        roomMeta.set(roomId, meta);
        const row = document.querySelector(`.room-row[data-id="${roomId}"]`);
        if (!row) return;
        const nameEl = row.querySelector('.rname');
        renderRoomRow(row, nameEl?.textContent || '', roomId);
      }

      // ── Room detail ───────────────────────────────────────────────────────────
      async function openRoom(roomSummary) {
        activeRoom = roomSummary;
        showMobileChat();

        // Highlight in sidebar + clear badge immediately
        document.querySelectorAll('.room-row').forEach((el) => {
          el.classList.toggle('active', el.dataset.id === roomSummary.id);
        });
        const meta = roomMeta.get(roomSummary.id);
        if (meta) { meta.unreadCount = 0; roomMeta.set(roomSummary.id, meta); }
        const badge = document.querySelector(`.room-row[data-id="${roomSummary.id}"] .badge`);
        if (badge) badge.remove();

        // Show cached messages instantly (no flicker, no waiting for HTTP/socket)
        const area = document.getElementById('chat-area');
        const cached = messagesCache.get(roomSummary.id);
        if (cached && cached.length > 0) {
          renderMessages(cached);
        } else {
          area.innerHTML = '';
        }
        typingUsers.clear();
        const ti = document.getElementById('typing-indicator');
        if (ti) ti.textContent = '';

        // Show room detail shell immediately using what we know from sidebar
        // (full detail + members will replace this after HTTP resolves)
        document.getElementById('main-placeholder').style.display = 'none';
        document.getElementById('room-detail').style.display = 'flex';
        // Collapse settings panel on each room open (clean state on mobile)
        document.getElementById('room-actions').classList.remove('expanded');

        // Build room from sidebar data — no need to refetch GET /rooms/:id
        const room = { ...roomSummary };
        if (room.type === 'DM') {
          room.displayName = roomSummary.dmPartner?.name || 'DM';
        } else {
          room.displayName = room.name || 'Unnamed room';
        }
        activeRoom = { ...activeRoom, displayName: room.displayName };
        renderRoomDetail(room);

        // Update sidebar display name
        const sidebarRow = document.querySelector(`.room-row[data-id="${room.id}"]`);
        if (sidebarRow) {
          const nameEl = sidebarRow.querySelector('.rname');
          if (nameEl) nameEl.textContent = room.displayName;
        }

        // Only fetch members (one request instead of two)
        try {
          const membersRes = await fetch(`${API}/rooms/${room.id}/members`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          // Guard: user may have switched rooms while HTTP was in flight
          if (activeRoom?.id !== room.id) return;
          const members = membersRes.ok ? (await membersRes.json()).data : [];
          renderMembers(members);
          joinSocketRoom(room.id);
        } catch {
          // Members failed — still show room and join socket
          renderMembers([]);
          joinSocketRoom(room.id);
        }
      }

      function renderRoomDetail(room) {
        const isOwner = room.role === 'OWNER';

        document.getElementById('rh-name').textContent =
          room.displayName || room.name || 'DM';
        document.getElementById('rh-count').textContent = room.memberCount;
        document.getElementById('rh-type').textContent = room.type;

        // owner-only actions
        const isDm = room.type === 'DM';
        document.getElementById('action-invite').style.display =
          isOwner && !isDm ? 'flex' : 'none';
        document.getElementById('action-remove').style.display =
          isOwner && !isDm ? 'flex' : 'none';
        document.getElementById('delete-btn').style.display =
          isOwner && !isDm ? 'inline-block' : 'none';
        document.getElementById('leave-btn').style.display = isDm
          ? 'none'
          : 'inline-block';

        document.getElementById('invite-status').textContent = '';
        document.getElementById('remove-status').textContent = '';
        document.getElementById('invite-email').value = '';
        document.getElementById('remove-email').value = '';

        document.getElementById('main-placeholder').style.display = 'none';
        document.getElementById('room-detail').style.display = 'flex';
      }

      function renderMembers(members) {
        const bar = document.getElementById('members-bar');
        bar.innerHTML = '';
        members.forEach((m) => {
          const isSelf = m.userId === currentUser?.id;
          const isOwner = m.role === 'OWNER';
          const initial = (m.user.name || '?')[0].toUpperCase();
          const chip = document.createElement('div');
          chip.className = 'mem-chip' + (isSelf ? ' self' : '');
          chip.dataset.uid = m.userId;
          chip.title = isSelf ? 'You' : `DM ${m.user.name}`;
          chip.innerHTML = `
            <div class="mem-avatar${isOwner ? ' owner' : ''}">${esc(initial)}</div>
            <span class="mem-name">${esc(m.user.name)}</span>
          `;
          if (!isSelf) {
            chip.addEventListener('click', () => {
              document.getElementById('dm-email').value = m.user.email;
              openDm();
            });
          }
          bar.appendChild(chip);
        });
      }

      // ── Create room — POST /rooms ─────────────────────────────────────────────
      async function createRoom() {
        const input = document.getElementById('new-room-name');
        const name = input.value.trim();
        if (!name) return;
        const btn = document.getElementById('create-room-btn');
        btn.disabled = true;
        try {
          const res = await fetch(`${API}/rooms`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ name }),
          });
          const json = await res.json();
          if (!res.ok)
            return toast(json.message || 'Failed to create room', 'error');
          input.value = '';
          toast(`"${json.data.name}" created`, 'success');
          loadRooms();
        } catch {
          toast('Network error', 'error');
        } finally {
          btn.disabled = false;
        }
      }

      // ── Invite user — POST /rooms/:id/invite ──────────────────────────────────
      async function inviteUser() {
        const email = document.getElementById('invite-email').value.trim();
        const status = document.getElementById('invite-status');
        if (!email) return;
        const btn = document.getElementById('invite-btn');
        btn.disabled = true;
        try {
          const res = await fetch(`${API}/rooms/${activeRoom.id}/invite`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ email }),
          });
          const json = await res.json();
          if (!res.ok) {
            status.textContent = json.message || 'Failed';
            status.style.color = '#f87171';
            return;
          }
          status.textContent = 'Invited!';
          status.style.color = '#4ade80';
          document.getElementById('invite-email').value = '';
        } catch {
          status.textContent = 'Network error';
          status.style.color = '#f87171';
        } finally {
          btn.disabled = false;
        }
      }

      // ── Remove member — DELETE /rooms/:id/members ─────────────────────────────
      async function removeMember() {
        const email = document.getElementById('remove-email').value.trim();
        const status = document.getElementById('remove-status');
        if (!email) return;
        if (!confirm(`Remove ${email} from this room?`)) return;
        const btn = document.getElementById('remove-btn');
        btn.disabled = true;
        try {
          const res = await fetch(`${API}/rooms/${activeRoom.id}/members`, {
            method: 'DELETE',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ email }),
          });
          const json = await res.json();
          if (!res.ok) {
            status.textContent = json.message || 'Failed';
            status.style.color = '#f87171';
            return;
          }
          status.textContent = 'Removed';
          status.style.color = '#4ade80';
          document.getElementById('remove-email').value = '';
          loadRooms();
        } catch {
          status.textContent = 'Network error';
          status.style.color = '#f87171';
        } finally {
          btn.disabled = false;
        }
      }

      // ── Leave room — DELETE /rooms/:id/leave ──────────────────────────────────
      async function leaveRoom() {
        if (!activeRoom) return;
        const msg =
          activeRoom.role === 'OWNER'
            ? "You are the owner. Leaving will auto-promote the earliest member. If you're the last member, the room is deleted. Continue?"
            : 'Leave this room?';
        if (!confirm(msg)) return;
        const btn = document.getElementById('leave-btn');
        btn.disabled = true;
        try {
          const res = await fetch(`${API}/rooms/${activeRoom.id}/leave`, {
            method: 'DELETE',
            headers: { Authorization: `Bearer ${token}` },
          });
          const json = await res.json();
          if (!res.ok) return toast(json.message || 'Could not leave', 'error');
          toast('Left room', 'success');
          activeRoom = null;
          closeRoomDetail();
          loadRooms();
        } catch {
          toast('Network error', 'error');
        } finally {
          btn.disabled = false;
        }
      }

      // ── Delete room — DELETE /rooms/:id ───────────────────────────────────────
      async function deleteRoom() {
        if (!activeRoom) return;
        if (
          !confirm(
            `Permanently delete "${activeRoom.displayName || activeRoom.name || 'this room'}"? This cannot be undone.`,
          )
        )
          return;
        const btn = document.getElementById('delete-btn');
        btn.disabled = true;
        try {
          const res = await fetch(`${API}/rooms/${activeRoom.id}`, {
            method: 'DELETE',
            headers: { Authorization: `Bearer ${token}` },
          });
          const json = await res.json();
          if (!res.ok)
            return toast(json.message || 'Could not delete', 'error');
          toast('Room deleted', 'success');
          activeRoom = null;
          closeRoomDetail();
          loadRooms();
        } catch {
          toast('Network error', 'error');
        } finally {
          btn.disabled = false;
        }
      }

      // ── Open DM — POST /rooms/dm ──────────────────────────────────────────────
      async function openDm() {
        const email = document.getElementById('dm-email').value.trim();
        const status = document.getElementById('dm-status');
        if (!email) return;
        const btn = document.getElementById('dm-btn');
        btn.disabled = true;
        status.textContent = '';
        try {
          const res = await fetch(`${API}/rooms/dm`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ email }),
          });
          const json = await res.json();
          if (!res.ok) {
            status.textContent = json.message || 'Failed';
            status.style.color = '#f87171';
            return;
          }
          document.getElementById('dm-email').value = '';
          status.textContent = 'DM opened';
          status.style.color = '#4ade80';
          await loadRooms();
          // find the DM room in the list and open it
          const dmRoom = json.data;
          const row = document.querySelector(
            `.room-row[data-id="${dmRoom.id}"]`,
          );
          if (row) row.click();
        } catch {
          status.textContent = 'Network error';
          status.style.color = '#f87171';
        } finally {
          btn.disabled = false;
        }
      }

      // ── Socket.io ─────────────────────────────────────────────────────────────
      function connectSocket() {
        if (socket?.connected) return;
        socket = io({ auth: { token } });

        socket.on('connect', () => {
          toast('Connected', 'success');
          // Re-subscribe to all known rooms so we receive events while not actively in them.
          // Always emit even with an empty list so the server registers our socket ID —
          // this is required to receive DM room_pushed and invite events immediately.
          const roomIds = [...lastSeenId.keys()];
          socket.emit('subscribe_rooms', { roomIds });
          // Rejoin active room to get any messages we missed while disconnected
          if (activeRoom) {
            joinSocketRoom(activeRoom.id);
          }
        });

        socket.on('disconnect', () => toast('Disconnected', 'error'));
        socket.on('ephemeral', (e) => toast(e.message, 'error'));

        socket.on('room_snapshot', ({ roomId, messages }) => {
          if (messages.length > 0) {
            // Full or delta load — replace/extend cache
            const existing = messagesCache.get(roomId) || [];
            const existingIds = new Set(existing.map((m) => m.id));
            const newMsgs = messages.filter((m) => !existingIds.has(m.id));
            const merged = [...existing, ...newMsgs].sort(
              (a, b) => new Date(a.createdAt) - new Date(b.createdAt),
            );
            messagesCache.set(roomId, merged);
            const newestId = messages[messages.length - 1].id;
            lastSeenId.set(roomId, newestId);
            // Only re-render if this is the currently active room
            if (activeRoom?.id === roomId) {
              renderMessages(merged);
              // Mark all as read since user is looking at them
              if (socket?.connected) {
                socket.emit('messages_read', { roomId, upToMessageId: newestId });
              }
            }
          }
          // messages === [] means client was up to date — cache already correct, don't wipe
        });

        socket.on('new_message', (msg) => {
          lastSeenId.set(msg.roomId, msg.id); // track even for rooms not currently open
          // Add to cache
          const cached = messagesCache.get(msg.roomId) || [];
          if (!cached.find((m) => m.id === msg.id)) {
            cached.push(msg);
            messagesCache.set(msg.roomId, cached);
          }
          const isActive = activeRoom?.id === msg.roomId;
          const preview = trunc(msg.content, 26);
          // only increment unread for non-active rooms (active room is being read)
          updateRoomRowMeta(msg.roomId, preview, isActive ? 0 : 1);
          if (!isActive) return;
          appendMessages([msg]);
          // Mark read immediately since this is the active room
          if (socket?.connected) {
            socket.emit('messages_read', { roomId: msg.roomId, upToMessageId: msg.id });
          }
        });

        socket.on('user_joined', ({ userId, name, roomId }) => {
          if (activeRoom?.id !== roomId) return;
          appendSystemMsg(`${esc(name)} joined`);

          // Add new member chip to members bar
          const bar = document.getElementById('members-bar');
          if (bar && !bar.querySelector(`[data-uid="${userId}"]`)) {
            const isSelf = userId === currentUser?.id;
            const initial = (name || '?')[0].toUpperCase();
            const chip = document.createElement('div');
            chip.className = 'mem-chip' + (isSelf ? ' self' : '');
            chip.dataset.uid = userId;
            chip.title = isSelf ? 'You' : `DM ${name}`;
            chip.innerHTML = `
              <div class="mem-avatar">${esc(initial)}</div>
              <span class="mem-name">${esc(name)}</span>
            `;
            bar.appendChild(chip);
          }

          // Increment member count in header
          const countEl = document.getElementById('rh-count');
          if (countEl) countEl.textContent = parseInt(countEl.textContent || '0') + 1;
          if (activeRoom) activeRoom.memberCount = (activeRoom.memberCount || 0) + 1;
        });

        socket.on('user_left', ({ userId, roomId }) => {
          if (activeRoom?.id !== roomId) return;
          appendSystemMsg(`A user left`);

          // Remove member chip
          const bar = document.getElementById('members-bar');
          const chip = bar?.querySelector(`[data-uid="${userId}"]`);
          if (chip) chip.remove();

          // Decrement member count in header
          const countEl = document.getElementById('rh-count');
          if (countEl) {
            const n = parseInt(countEl.textContent || '1') - 1;
            countEl.textContent = Math.max(0, n);
          }
          if (activeRoom) activeRoom.memberCount = Math.max(0, (activeRoom.memberCount || 1) - 1);
        });

        socket.on('typing_update', ({ roomId, userId, name, isTyping }) => {
          if (activeRoom?.id !== roomId) return;
          if (userId === currentUser?.id) return; // don't show own typing
          updateTypingIndicator(userId, name, isTyping);
        });

        // Room was deleted by owner — remove from sidebar, close if active
        socket.on('room_deleted', ({ roomId }) => {
          const row = document.querySelector(`.room-row[data-id="${roomId}"]`);
          if (row) row.remove();
          roomMeta.delete(roomId);
          lastSeenId.delete(roomId);
          if (activeRoom?.id === roomId) {
            activeRoom = null;
            closeRoomDetail();
            toast('This room was deleted', 'error');
          }
        });

        // This user was removed from a room by the owner
        socket.on('room_removed', ({ roomId }) => {
          const row = document.querySelector(`.room-row[data-id="${roomId}"]`);
          if (row) row.remove();
          roomMeta.delete(roomId);
          lastSeenId.delete(roomId);
          if (activeRoom?.id === roomId) {
            activeRoom = null;
            closeRoomDetail();
            toast('You were removed from this room', 'error');
          }
        });

        // ── Read receipts ─────────────────────────────────────────────────────
        // receipt_update can carry either a deliveredCount (delivery) or readBy (read)
        socket.on('receipt_update', ({ messageId, deliveredCount, readBy, upToMessageId }) => {
          if (messageId && deliveredCount !== undefined) {
            // Delivery receipt for a specific message
            markMessageDelivered(messageId);
          } else if (upToMessageId) {
            // Read receipt: mark the message and all before it as read by someone
            markMessageRead(upToMessageId);
          }
        });

        // ── Voice transcription ───────────────────────────────────────────────
        socket.on('voice_transcribed', ({ messageId, transcript, audioUrl }) => {
          // Update the message bubble content and attach an audio player
          const el = document.querySelector(`[data-msg-id="${messageId}"]`);
          if (el) {
            const contentEl = el.querySelector('.msg-content');
            if (contentEl) contentEl.innerHTML = renderContent(transcript);
            // Remove loading indicator now that we have real content
            el.querySelector('.voice-loading')?.remove();
            if (audioUrl && !el.querySelector('.msg-audio')) {
              const audio = document.createElement('audio');
              audio.controls = true;
              audio.src = audioUrl;
              audio.className = 'msg-audio';
              el.querySelector('.msg-bubble')?.appendChild(audio);
            }
          }
          // Also update the message cache
          if (activeRoom) {
            const cached = messagesCache.get(activeRoom.id) || [];
            const idx = cached.findIndex((m) => m.id === messageId);
            if (idx !== -1) { cached[idx].content = transcript; cached[idx].audioUrl = audioUrl; }
          }
        });

        // ── AI streaming ──────────────────────────────────────────────────────
        socket.on('ai_thinking', ({ triggeredBy }) => {
          if (!activeRoom) return;
          // Show a single pulsing Siri bubble — replaced by the real stream on first token
          const area = document.getElementById('chat-area');
          let thinking = document.getElementById('siri-thinking');
          if (!thinking) {
            thinking = buildAiTempBubble('siri-thinking');
            thinking.id = 'siri-thinking';
            const contentEl = thinking.querySelector('.msg-content');
            if (contentEl) {
              contentEl.style.cssText = 'opacity:0.5;font-style:italic';
              contentEl.textContent = 'thinking…';
            }
            area.appendChild(thinking);
            area.scrollTop = area.scrollHeight;
          }
        });

        socket.on('ai_token', ({ token: t, tempMessageId }) => {
          if (!activeRoom) return;
          // Remove the thinking placeholder on first token
          document.getElementById('siri-thinking')?.remove();
          let bubble = tempBubbles.get(tempMessageId);
          if (!bubble) {
            bubble = buildAiTempBubble(tempMessageId);
            tempBubbles.set(tempMessageId, bubble);
            const area = document.getElementById('chat-area');
            area.appendChild(bubble);
          }
          const contentEl = bubble.querySelector('.msg-content');
          if (contentEl) {
            // Accumulate raw text on the element, then re-render with mention highlighting
            contentEl._raw = (contentEl._raw || '') + t;
            contentEl.innerHTML = renderContent(contentEl._raw);
          }
          const area = document.getElementById('chat-area');
          area.scrollTop = area.scrollHeight;
        });

        socket.on('ai_response_complete', ({ messageId, tempMessageId, content }) => {
          document.getElementById('siri-thinking')?.remove();
          const bubble = tempBubbles.get(tempMessageId);
          if (bubble) {
            bubble.dataset.msgId = messageId;
            tempBubbles.delete(tempMessageId);
            // Replace streamed content with server-deduped final content
            if (content) {
              const contentEl = bubble.querySelector('.msg-content');
              if (contentEl) {
                contentEl._raw = content;
                contentEl.innerHTML = renderContent(content);
              }
            }
          }
          // Add to cache as an AI message so room switch keeps it
          if (activeRoom) {
            const cached = messagesCache.get(activeRoom.id) || [];
            if (!cached.find((m) => m.id === messageId)) {
              const finalContent = content || bubble?.querySelector('.msg-content')?._raw || bubble?.querySelector('.msg-content')?.textContent || '';
              cached.push({ id: messageId, roomId: activeRoom.id, userId: null, content: finalContent, type: 'AI', createdAt: new Date().toISOString() });
              messagesCache.set(activeRoom.id, cached);
            }
          }
        });

        socket.on('ai_audio_ready', ({ messageId, audioUrl }) => {
          // Attach TTS audio player to the AI message bubble
          const el = document.querySelector(`[data-msg-id="${messageId}"]`);
          if (el && !el.querySelector('.msg-audio')) {
            const audio = document.createElement('audio');
            audio.controls = true;
            audio.src = audioUrl;
            audio.className = 'msg-audio';
            audio.autoplay = true;
            el.querySelector('.msg-bubble')?.appendChild(audio);
          }
        });

        // Owner invited us — add room to sidebar without HTTP refresh
        socket.on('room_pushed', ({ room }) => {
          if (!room) return;
          roomMeta.set(room.id, { preview: 'No messages', unreadCount: 0 });
          const scroll = document.getElementById('rooms-scroll');
          const empty = document.getElementById('rooms-empty');
          empty.style.display = 'none';
          const div = document.createElement('div');
          div.className = 'room-row';
          div.dataset.id = room.id;
          const displayName = room.dmPartner?.name || room.name || 'DM';
          renderRoomRow(div, displayName, room.id);
          div.addEventListener('click', () => openRoom({ ...room, role: 'MEMBER' }));
          scroll.appendChild(div);
          // subscribe to events in this room immediately
          socket.emit('subscribe_rooms', { roomIds: [room.id] });
          toast(`${displayName} started a DM with you`, 'success');
        });
      }

      // typing indicator state: Map of userId → name
      const typingUsers = new Map();

      function updateTypingIndicator(userId, name, isTyping) {
        if (isTyping) typingUsers.set(userId, name);
        else typingUsers.delete(userId);
        const el = document.getElementById('typing-indicator');
        if (!el) return;
        if (typingUsers.size === 0) {
          el.textContent = '';
          return;
        }
        const names = [...typingUsers.values()].map((n) => esc(n));
        el.textContent =
          names.length === 1
            ? `${names[0]} is typing…`
            : `${names.join(', ')} are typing…`;
      }

      function joinSocketRoom(roomId) {
        if (!socket?.connected) return;
        const payload = { roomId };
        const cursor = lastSeenId.get(roomId);
        if (cursor) payload.lastMessageId = cursor;
        socket.emit('join_room', payload);
      }

      // ── Chat ──────────────────────────────────────────────────────────────────
      // Typing debounce — emit typing_stop 2s after last keystroke
      let typingTimeout = null;
      function onChatInput() {
        if (!activeRoom || !socket?.connected) return;
        socket.emit('typing_start', { roomId: activeRoom.id });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          socket.emit('typing_stop', { roomId: activeRoom.id });
        }, 2000);
      }

      // Heartbeat — every 20s to keep presence alive
      setInterval(() => {
        if (socket?.connected) socket.emit('heartbeat');
      }, 20000);

      function sendMessage() {
        const input = document.getElementById('chat-input');
        const content = input.value.trim();
        if (!content || !activeRoom || !socket?.connected) return;
        const btn = document.getElementById('send-btn');
        btn.disabled = true;
        socket.emit('typing_stop', { roomId: activeRoom.id });
        clearTimeout(typingTimeout);

        const optId = `opt-${Date.now()}`;
        const optimisticMsg = {
          id: optId,
          roomId: activeRoom.id,
          userId: currentUser.id,
          content,
          createdAt: new Date().toISOString(),
          user: { id: currentUser.id, name: currentUser.name, avatar: currentUser.avatar },
        };

        // Add to cache immediately so room switch preserves it
        const cached = messagesCache.get(activeRoom.id) || [];
        cached.push(optimisticMsg);
        messagesCache.set(activeRoom.id, cached);

        // Show pending bubble immediately (grey dot, dimmed)
        const area = document.getElementById('chat-area');
        const bubble = buildMessageEl(optimisticMsg, true);
        area.appendChild(bubble);
        area.scrollTop = area.scrollHeight;

        // Clear input early so UX feels instant
        input.value = '';
        input.style.height = '40px';

        // Update sidebar preview for sender immediately (sender won't get new_message)
        updateRoomRowMeta(activeRoom.id, trunc(content, 26), 0);

        const capturedRoomId = activeRoom.id;
        socket.emit(
          'send_message',
          { roomId: capturedRoomId, content },
          (ack) => {
            btn.disabled = false;
            if (ack?.messageId) {
              lastSeenId.set(capturedRoomId, ack.messageId);
              // Upgrade the optimistic bubble to the real persisted message
              const el = document.querySelector(`[data-msg-id="${optId}"]`);
              if (el) {
                el.dataset.msgId = ack.messageId;
                // Replace optimistic entry in cache with real id
                const cached = messagesCache.get(capturedRoomId) || [];
                const idx = cached.findIndex((m) => m.id === optId);
                if (idx !== -1) cached[idx] = { ...cached[idx], id: ack.messageId };
                messagesCache.set(capturedRoomId, cached);
                const statusEl = el.querySelector('.msg-status');
                if (statusEl) { statusEl.textContent = '✓'; statusEl.style.color = '#555'; }
                const bubbleEl = el.querySelector('div[style*="background"]');
                if (bubbleEl) bubbleEl.style.opacity = '1';
              }
              // Tell server it was delivered (triggers receipt_update back to sender)
              socket.emit('message_delivered', { messageId: ack.messageId });
            }
          },
        );
        btn.disabled = false;
      }

      function onChatKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      function renderMessages(messages) {
        const area = document.getElementById('chat-area');
        area.innerHTML = '';
        messages.forEach((m) => area.appendChild(buildMessageEl(m)));
        area.scrollTop = area.scrollHeight;
      }

      function appendMessages(messages) {
        const area = document.getElementById('chat-area');
        messages.forEach((m) => area.appendChild(buildMessageEl(m)));
        area.scrollTop = area.scrollHeight;
      }

      function appendSystemMsg(text) {
        const area = document.getElementById('chat-area');
        const div = document.createElement('div');
        div.style.cssText =
          'text-align:center;font-size:11px;color:#444;padding:4px 0';
        div.textContent = text;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
      }

      function buildMessageEl(msg, pending = false) {
        const isAi = msg.type === 'AI' || msg.userId === null;
        const isVoice = msg.type === 'VOICE';
        const isMine = !isAi && msg.userId === currentUser?.id;
        const name = isAi ? '🎙️ Siri' : (msg.user?.name || 'Unknown');
        const time = new Date(msg.createdAt).toLocaleTimeString([], {
          hour: '2-digit',
          minute: '2-digit',
        });
        const bgColor = isAi ? '#1a2a1a' : isMine ? '#2a3a5c' : '#1e1e1e';
        const align = isAi ? 'flex-start' : isMine ? 'flex-end' : 'flex-start';

        const div = document.createElement('div');
        div.style.cssText = `display:flex;flex-direction:column;align-items:${align};padding:3px 20px`;

        // status dot: ● sending (grey), ✓ sent (dim), ✓✓ delivered (blue)
        const statusHtml = isMine
          ? `<span class="msg-status" style="font-size:10px;color:${pending ? '#555' : '#444'};margin-top:2px">${pending ? '● sending' : '✓'}</span>`
          : '';

        const badgeHtml = isAi
          ? `<div class="msg-type-badge">🎙️ Siri</div>`
          : isVoice
          ? `<div class="msg-type-badge">🎤 Voice</div>`
          : '';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.style.cssText = `max-width:70%;background:${bgColor};border-radius:10px;padding:8px 12px;font-size:14px;line-height:1.4;opacity:${pending ? '0.6' : '1'}`;

        const contentEl = document.createElement('span');
        contentEl.className = 'msg-content';
        contentEl.innerHTML = renderContent(msg.content || '');
        bubble.appendChild(contentEl);

        // Audio player for VOICE messages
        if (isVoice && msg.audioUrl) {
          const audio = document.createElement('audio');
          audio.controls = true;
          audio.src = msg.audioUrl;
          audio.className = 'msg-audio';
          bubble.appendChild(audio);
        } else if (isVoice) {
          const indicator = document.createElement('div');
          indicator.className = 'voice-loading';
          indicator.style.cssText = 'font-size:11px;color:#666;margin-top:4px;font-style:italic';
          indicator.textContent = '⏳ audio processing...';
          bubble.appendChild(indicator);
        }
        // Audio player for AI messages with TTS
        if (isAi && msg.audioUrl) {
          const audio = document.createElement('audio');
          audio.controls = true;
          audio.src = msg.audioUrl;
          audio.className = 'msg-audio';
          bubble.appendChild(audio);
        }

        div.innerHTML = `
          ${!isMine ? `<div style="font-size:11px;color:#555;margin-bottom:2px">${esc(name)}</div>` : ''}
          ${badgeHtml}
        `;
        div.appendChild(bubble);
        const meta = document.createElement('div');
        meta.style.cssText = 'display:flex;gap:4px;align-items:center;margin-top:2px';
        meta.innerHTML = `<span style="font-size:10px;color:#444">${time}</span>${statusHtml}`;
        div.appendChild(meta);

        if (msg.id) div.dataset.msgId = msg.id;
        return div;
      }

      // Temp bubble for AI streaming tokens
      function buildAiTempBubble(tempMessageId) {
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start;padding:3px 20px';
        div.dataset.tempId = tempMessageId;
        div.innerHTML = `<div style="font-size:11px;color:#555;margin-bottom:2px">🎙️ Siri</div>`;
        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.style.cssText = 'max-width:70%;background:#1a2a1a;border-radius:10px;padding:8px 12px;font-size:14px;line-height:1.4';
        const contentEl = document.createElement('span');
        contentEl.className = 'msg-content';
        contentEl.textContent = '';
        bubble.appendChild(contentEl);
        div.appendChild(bubble);
        return div;
      }

      // Mark a message bubble as read by recipient (double-tick, green)
      function markMessageRead(messageId) {
        const el = document.querySelector(`[data-msg-id="${messageId}"] .msg-status`);
        if (el) {
          el.textContent = '✓✓';
          el.style.color = '#4ade80';
        }
      }

      function markMessageDelivered(msgId) {
        const el = document.querySelector(`[data-msg-id="${msgId}"] .msg-status`);
        if (el) {
          el.textContent = '✓✓';
          el.style.color = '#7c9ef8';
        }
        // also remove pending opacity
        const bubble = document.querySelector(`[data-msg-id="${msgId}"] div[style*="background"]`);
        if (bubble) bubble.style.opacity = '1';
      }

      // ── UI helpers ────────────────────────────────────────────────────────────
      function showLoggedIn() {
        document.getElementById('logged-out').style.display = 'none';
        document.getElementById('logged-in').style.display = 'block';
        document.getElementById('user-card').style.display = 'flex';
        document.getElementById('user-name').textContent = currentUser.name;
        document.getElementById('user-email').textContent = currentUser.email;
        document.getElementById('user-avatar').textContent =
          (currentUser.name || '?')[0].toUpperCase();
        document.getElementById('rooms-signin').style.display = 'none';
        document.getElementById('rooms-panel').style.display = 'flex';
        document.getElementById('rooms-panel').style.flexDirection = 'column';
        document.getElementById('dm-panel').style.display = 'block';
        document.getElementById('main-placeholder').textContent =
          'Select a room to get started';
        document.getElementById('main-placeholder').style.display = 'flex';
        connectSocket();
      }

      function showLoggedOut() {
        document.getElementById('logged-out').style.display = 'block';
        document.getElementById('logged-in').style.display = 'none';
        document.getElementById('rooms-signin').style.display = 'block';
        document.getElementById('rooms-panel').style.display = 'none';
        document.getElementById('dm-panel').style.display = 'none';
        document
          .getElementById('rooms-scroll')
          .querySelectorAll('.room-row')
          .forEach((e) => e.remove());
        closeRoomDetail();
        document.getElementById('main-placeholder').textContent =
          'Sign in to start chatting';
        document.getElementById('main-placeholder').style.display = 'flex';
        if (socket) {
          socket.disconnect();
          socket = null;
        }
        lastSeenId.clear();
        messagesCache.clear();
      }

      function closeRoomDetail() {
        document.getElementById('room-detail').style.display = 'none';
        document.getElementById('members-bar').innerHTML = '';
        document.getElementById('chat-area').innerHTML = '';
        document
          .querySelectorAll('.room-row')
          .forEach((el) => el.classList.remove('active'));
      }

      function showStatus(msg, type) {
        const el = document.getElementById('auth-status');
        el.textContent = msg;
        el.style.color = type === 'err' ? '#f87171' : '#4ade80';
      }

      function toast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = type;
        el.style.display = 'block';
        setTimeout(() => {
          el.style.display = 'none';
        }, 3000);
      }

      function esc(s) {
        return String(s ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      // Renders message text with @mention highlighting.
      // @currentUser.name gets a brighter self-highlight; all other @words get the base style.
      function renderContent(text) {
        return esc(text).replace(/@(\S+)/g, (_, word) => {
          const isSelf =
            currentUser?.name &&
            word.replace(/[,.:!?]+$/, '').toLowerCase() ===
              currentUser.name.toLowerCase();
          return `<span class="mention${isSelf ? ' mention-self' : ''}">@${word}</span>`;
        });
      }

      function trunc(s, n) {
        return s && s.length > n ? s.slice(0, n) + '…' : s || '';
      }
    </script>
  </body>
</html>
